<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Demo afbeelding met kleurrijke grafieken">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <g opacity="0.9">
    <circle cx="170" cy="160" r="18" fill="#22c55e"/>
    <circle cx="1430" cy="150" r="24" fill="#fde047"/>
    <circle cx="1350" cy="710" r="16" fill="#f472b6"/>
    <circle cx="240" cy="720" r="22" fill="#38bdf8"/>
  </g>
  <g fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="2">
    <path d="M0 710 C260 600 420 850 680 720 S1130 560 1600 690"/>
    <path d="M0 250 C250 360 480 130 720 250 S1180 460 1600 280"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="185" width="880" height="530" rx="36" fill="#f8fafc"/>
    <rect x="400" y="235" width="800" height="120" rx="22" fill="#0f172a"/>
    <text x="430" y="310" fill="#fff" font-family="Arial, sans-serif" font-size="48" font-weight="700">Demo dashboard: alles staat op feeststand</text>
    <rect x="420" y="405" width="190" height="220" rx="18" fill="#dbeafe"/>
    <rect x="650" y="405" width="230" height="220" rx="18" fill="#dcfce7"/>
    <rect x="920" y="405" width="250" height="220" rx="18" fill="#ffedd5"/>
    <path d="M455 570 L500 510 L545 535 L590 455" fill="none" stroke="#2563eb" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="685" y="520" width="34" height="70" rx="8" fill="#16a34a"/>
    <rect x="740" y="475" width="34" height="115" rx="8" fill="#22c55e"/>
    <rect x="795" y="440" width="34" height="150" rx="8" fill="#86efac"/>
    <circle cx="1045" cy="515" r="74" fill="#fb923c"/>
    <path d="M1045 441 A74 74 0 0 1 1119 515 L1045 515 Z" fill="#2563eb"/>
  </g>
  <g transform="translate(1140 150) rotate(12)" filter="url(#shadow)">
    <rect x="0" y="0" width="210" height="120" rx="22" fill="#fde047"/>
    <text x="28" y="75" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">GEK!</text>
  </g>
  <g fill="#fff" opacity="0.85">
    <rect x="180" y="420" width="110" height="18" rx="9"/>
    <rect x="1310" y="430" width="130" height="18" rx="9"/>
    <rect x="250" y="500" width="70" height="14" rx="7"/>
    <rect x="1280" y="540" width="80" height="14" rx="7"/>
  </g>
</svg>
